<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAST-NUCES Multan — Attendance Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db-client.js?v=3"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0A2540 0%, #0f3460 50%, #1a3a5c 100%);
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(244,168,29,0.15) 0%, transparent 70%);
    top: -200px; right: -200px; border-radius: 50%;
  }
  body::after {
    content: ''; position: absolute; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    bottom: -100px; left: -100px; border-radius: 50%;
  }
  .login-box {
    background: rgba(255,255,255,0.97);
    border-radius: 20px; padding: 48px 44px; width: 420px; max-width: 90vw;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    position: relative; z-index: 1;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .logo { text-align: center; margin-bottom: 20px; font-size: 40px; }
  .title { text-align: center; font-size: 22px; font-weight: 700; color: #0A2540; margin-bottom: 6px; }
  .sub { text-align: center; color: #64748B; font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.7px; color: #64748B; margin-bottom: 7px; }
  .field input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 14px; font-family: inherit; background: #f8fafc; color: #1a2b3c;
  }
  .field input:focus { outline: none; border-color: #145A9E; background: #fff; box-shadow: 0 0 0 3px rgba(10,36,64,0.08); }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 9px; background: #0A2540; color: #fff;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: #145A9E; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .links { text-align: center; margin-top: 20px; font-size: 12.5px; }
  .links a { color: #145A9E; text-decoration: none; margin: 0 8px; font-weight: 500; cursor: pointer; }
  .links a:hover { color: #F4A81D; }
  #msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; display: none; }
  #msg.error { background: #fee2e2; color: #991b1b; display: block; }
  #msg.success { background: #d1fae5; color: #065f46; display: block; }
  #msg.info { background: #dbeafe; color: #1e40af; display: block; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,37,64,0.55); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; border-radius: 16px; width: 380px; max-width: 92vw; padding: 26px; box-shadow: 0 30px 80px rgba(0,0,0,0.25); }
  .modal-box h3 { color: #0A2540; font-size: 16px; margin-bottom: 16px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .btn-ghost { background: transparent; color: #1a2b3c; border: 1.5px solid #e2e8f0; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

  <div class="login-box">
    <div class="logo">🎓</div>
    <div class="title">Employee Portal</div>
    <div class="sub">FAST-NUCES Multan Campus<br>Attendance Management System</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@nu.edu.pk" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')login()">
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Sign In Securely</button>

    <div id="msg"></div>

    <div class="links">
      <a onclick="openForgot()">Forgot Password?</a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotModal" class="modal-overlay">
    <div class="modal-box">
      <h3>Reset Password</h3>
      <p style="color:#64748B;font-size:13px;margin-bottom:16px;line-height:1.6;">Enter your registered email — we'll send you a secure link to set a new password.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="you@nu.edu.pk">
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeForgot()">Cancel</button>
        <button class="btn" style="width:auto;padding:10px 18px;" onclick="sendReset()">Send Reset Link</button>
      </div>
    </div>
  </div>

  <script>
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = type;
      el.textContent = text;
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) { showMsg('Please enter both email and password.', 'error'); return; }

      btn.disabled = true; btn.textContent = 'Signing in…';
      showMsg('Authenticating…', 'info');

      try {
        const res = await DB.login(email, password);
        if (!res.success) {
          showMsg(res.message || 'Login failed.', 'error');
          btn.disabled = false; btn.textContent = 'Sign In Securely';
          return;
        }

        const role = res.profile?.role;
        showMsg('Welcome, ' + (res.profile?.full_name || res.profile?.username) + '! Redirecting…', 'success');

        setTimeout(() => {
          if (role === 'SuperAdmin') window.location.href = 'superadmin.html';
          else if (role === 'HOD') window.location.href = 'hod.html';
          else if (role === 'Employee') window.location.href = 'employee.html';
          else { showMsg('Your account has no role assigned yet. Contact your administrator.', 'error'); btn.disabled = false; btn.textContent = 'Sign In Securely'; }
        }, 700);
      } catch (e) {
        showMsg('Connection error: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In Securely';
      }
    }

    function openForgot() { document.getElementById('forgotModal').classList.add('open'); }
    function closeForgot() { document.getElementById('forgotModal').classList.remove('open'); }

    async function sendReset() {
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) return;
      const res = await DB.sendPasswordReset(email);
      closeForgot();
      showMsg(res.success ? 'Reset link sent — check your email.' : (res.message || 'Failed to send reset email.'), res.success ? 'success' : 'error');
    }

    // If already logged in, skip straight to the right portal
    (async function checkExistingSession() {
      const session = await DB.getSession();
      if (session) {
        const profile = await DB.getMyProfile();
        if (profile?.role === 'SuperAdmin') window.location.href = 'superadmin.html';
        else if (profile?.role === 'HOD') window.location.href = 'hod.html';
        else if (profile?.role === 'Employee') window.location.href = 'employee.html';
      }
    })();
  </script>
</body>
</html>
